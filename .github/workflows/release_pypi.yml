name: PyPI release

on:
  release:
    types: [released]

jobs:
  build_and_upload:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip build setuptools twine

    - name: Build and upload idf-drivers-gdb ${{ github.event.release.tag_name }}
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_PROJECT_TOKEN }}
      run: |
        set -euo pipefail

        RELEASE_TAG="${{ github.event.release.tag_name }}"
        CURRENT_VERSION=$(python -c "from idf_drivers_gdb import __version__; print(__version__)")
        case "$RELEASE_TAG" in
          "$CURRENT_VERSION"|"v$CURRENT_VERSION") ;;
          *)
            echo "::error::Release tag ${RELEASE_TAG} does not match package version ${CURRENT_VERSION}"
            exit 1
            ;;
        esac

        PUBLISHED_VERSION=$(python - <<'PY'
        import json
        from urllib.error import HTTPError
        from urllib.request import urlopen

        try:
            with urlopen('https://pypi.org/pypi/idf-drivers-gdb/json', timeout=30) as response:
                print(json.load(response)['info']['version'])
        except HTTPError as err:
            if err.code == 404:
                print('')
            else:
                raise
        PY
        )
        if [ "$PUBLISHED_VERSION" == "$CURRENT_VERSION" ]; then
          echo "Version ${PUBLISHED_VERSION} already published, skipping..."
          exit 0
        else
          echo "Packaging and publishing new idf-drivers-gdb version: ${CURRENT_VERSION}"
          python -m build
          twine check dist/* && twine upload dist/*
        fi
